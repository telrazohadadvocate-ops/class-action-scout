services:
  # ── Web dashboard ──────────────────────────────────────────
  - type: web
    name: scout-web
    env: docker
    dockerfilePath: ./Dockerfile
    plan: standard
    disk:
      name: scout-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: PACER_USERNAME
        sync: false
      - key: PACER_PASSWORD
        sync: false
      - key: OUTLOOK_CLIENT_ID
        sync: false
      - key: OUTLOOK_TENANT_ID
        sync: false
      - key: OUTLOOK_USER_EMAIL
        value: Ohad@levin-telraz.co.il
      - key: GMAIL_ADDRESS
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: REPORT_RECIPIENTS
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: PYTHONIOENCODING
        value: utf-8

  # ── Daily pipeline cron — 06:00 IST (= 03:00 UTC) ─────────
  # Uses alpine (has sh built-in) to install curl and trigger the web service.
  - type: cron
    name: scout-daily
    runtime: image
    image:
      url: docker.io/alpine:latest
    schedule: "0 3 * * *"
    dockerCommand: "sh -c 'apk add --no-cache curl > /dev/null 2>&1 && curl -fsS -X POST https://scout-web-0l5o.onrender.com/api/run -H \"Content-Type: application/json\" -H \"X-Cron-Secret: $CRON_SECRET\" -d \"{\\\"skip_pinkas\\\":true}\" || echo CRON_FAILED'"
    envVars:
      - key: CRON_SECRET
        sync: false
