services:
  - type: web
    name: scout-web
    env: docker
    dockerfilePath: ./Dockerfile
    plan: standard
    disk:
      name: scout-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: PACER_USERNAME
        sync: false
      - key: PACER_PASSWORD
        sync: false
      - key: OUTLOOK_CLIENT_ID
        sync: false
      - key: OUTLOOK_TENANT_ID
        sync: false
      - key: OUTLOOK_USER_EMAIL
        sync: false
      - key: RENDER
        value: "true"
      - key: CRON_SECRET
        sync: false
